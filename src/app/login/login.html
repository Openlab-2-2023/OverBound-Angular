<div class="login-wrapper">
	<div class="login-box">
		<div class="title">{{ mode === 'login' ? 'Login' : 'Register' }}</div>

		<div class="login-controls">
			<button [class.active]="mode==='login'" (click)="switchMode('login')">Login</button>
			<button [class.active]="mode==='register'" (click)="switchMode('register')">Register</button>
		</div>

		<form (submit)="submit(); $event.preventDefault();">
			@if (mode === 'register') {
				<div class="field">
					<label>Username</label>
					<input type="text" [(ngModel)]="username" name="username" placeholder="Choose username" [disabled]="loading" />
				</div>
				<div class="field-divider" aria-hidden="true"></div>
			}

			<div class="field">
				<label>Email</label>
				<input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" [disabled]="loading" />
			</div>

			<div class="field-divider" aria-hidden="true"></div>

			<div class="field">
				<label>Password</label>
				<input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" [disabled]="loading" />
			</div>

			<div class="actions">
				<button type="submit" class="submit-btn" [disabled]="loading">
					@if (!loading) {
						<span>{{ mode === 'login' ? 'Login' : 'Register' }}</span>
					}
					@if (loading) {
						<span class="btn-loading">
							<span class="dot"></span>
							<span class="dot"></span>
							<span class="dot"></span>
						</span>
					}
				</button>
				<button type="button" class="back-btn" (click)="goBack()" [disabled]="loading">Back</button>
			</div>

			@if (message) {
			<div class="message">{{message}}</div>
			}
		</form>
	</div>
</div>
