<div class="login-wrapper">
	<div class="login-box">
		<div class="title">{{ mode === 'login' ? 'Login' : 'Register' }}</div>

		<div class="login-controls">
			<button [class.active]="mode==='login'" (click)="switchMode('login')">Login</button>
			<button [class.active]="mode==='register'" (click)="switchMode('register')">Register</button>
		</div>

		<form (submit)="submit(); $event.preventDefault();">
			<div class="field">
				<label>Email</label>
				<input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" />
			</div>

			<div class="field-divider" aria-hidden="true"></div>

			<div class="field">
				<label>Password</label>
				<input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" />
			</div>

			<div class="actions">
				<button type="submit" class="submit-btn">{{ mode === 'login' ? 'Login' : 'Register' }}</button>
				<button type="button" class="back-btn" (click)="goBack()">Back</button>
			</div>

			@if (message) {
			<div class="message">{{message}}</div>
			}
		</form>
	</div>
</div>
